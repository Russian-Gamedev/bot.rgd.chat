version: 2

updates:
  # Bun / npm deps: package.json + bun.lock
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # Dockerfile
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
